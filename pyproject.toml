[project]
name = "atcoder"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "beautifulsoup4>=4.14.3",
    "pyautogui>=0.9.54",
    "pygetwindow>=0.0.9",
    "pyperclip>=1.11.0",
    "python-dotenv>=1.2.1",
    "requests>=2.32.5",
]

[dependency-groups]
dev = [
    "pyright>=1.1.408",
    "ruff>=0.15.2",
]

[tool.pyright]
include = [
    "test/auto_test",
    "library/compression",
    "library/connectivity",
    "library/containers",
    "library/number",
    "library/persistent",
    "library/range_query",
]

[tool.ruff]
line-length = 88
include = [
    "test/auto_test/**/*.py",
    "library/**/*.py",
]
