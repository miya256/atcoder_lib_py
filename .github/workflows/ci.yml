name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs: # job は別マシンで並列に実行される
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync
        run: uv sync --group dev --group auto_test

      - name: Run pyright
        run: uv run pyright
      
      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Generate snippets
        run: uv run python tools/snippets_generater.py

      - name: Check snippets diff
        run: git diff --exit-code --ignore-cr-at-eol